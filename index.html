<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LJB Service Record Leaderboard</title>
<style>
  :root {
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 20px 60px;
    background: #0e1622;
    color: #e8ecf2;
    font-family: Georgia, 'Times New Roman', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    color: #d4af37;
    letter-spacing: 3px;
    font-size: 1.6rem;
    text-transform: uppercase;
    margin: 0 0 6px;
    text-align: center;
  }
  .subtitle {
    color: #8b93a6;
    font-size: 0.9rem;
    margin: 0 0 32px;
    text-align: center;
  }
  table {
    width: 100%;
    max-width: 900px;
    border-collapse: collapse;
    background: #16233a;
    border: 2px solid #d4af37;
    border-radius: 10px;
    overflow: hidden;
  }
  thead th {
    background: #1c2c48;
    color: #d4af37;
    font-weight: normal;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 0.78rem;
    padding: 14px 16px;
    text-align: left;
    border-bottom: 1px solid #3a4a63;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: #f0d97a; }
  thead th .sort-arrow {
    display: inline-block;
    width: 0.9em;
    opacity: 0.6;
  }
  tbody td {
    padding: 12px 16px;
    border-bottom: 1px solid #23344f;
    font-size: 0.95rem;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #1c2c48; }
  td.rank {
    color: #d4af37;
    font-weight: bold;
    width: 48px;
  }
  td.name { color: #f2ede2; }
  td.name a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dotted #5b6579;
  }
  td.name a:hover { border-bottom-color: #d4af37; }
  td.commission { color: #c8b98a; font-size: 0.88rem; }
  td.numeric { text-align: right; font-variant-numeric: tabular-nums; color: #d7dee8; }
  .empty {
    text-align: center;
    color: #8b93a6;
    padding: 60px 20px;
    max-width: 900px;
    border: 1px dashed #3a4a63;
    border-radius: 10px;
    width: 100%;
  }
  .updated {
    color: #5b6579;
    font-size: 0.78rem;
    margin-top: 24px;
    text-align: center;
  }
  #avatar-preview {
    position: fixed;
    display: none;
    pointer-events: none;
    z-index: 10;
    border: 2px solid #d4af37;
    border-radius: 6px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
    max-height: 160px;
  }
</style>
</head>
<body>
  <h1>LJB Service Record Leaderboard</h1>
  <p class="subtitle">Click a column to re-rank. Hover a name for their portrait.</p>
  <div id="content">
    <div class="empty">Loading…</div>
  </div>
  <p class="updated" id="updated"></p>
  <img id="avatar-preview" alt="" />

<script>
const COLUMNS = [
  { key: 'rank', label: '#', sortable: false },
  { key: 'displayName', label: 'Encoder', type: 'string' },
  { key: 'commission', label: 'Commission', type: 'string' },
  { key: 'achievements', label: 'Achievements', type: 'number', defaultDir: 'desc' },
  { key: 'texts', label: 'Docs', type: 'number', defaultDir: 'desc' },
  { key: 'tags', label: 'Tags', type: 'number', defaultDir: 'desc' },
  { key: 'disambiguated', label: 'Disambig.', type: 'number', defaultDir: 'desc' },
  { key: 'entities', label: 'Entities', type: 'number', defaultDir: 'desc' },
];

const sortValue = (entry, key) => {
  switch (key) {
    case 'displayName':
      return (entry.displayName ?? '').toLowerCase();
    case 'commission':
      return (entry.commission ?? '').toLowerCase();
    case 'achievements':
      return entry.unlockedCount ?? 0;
    default:
      return entry.metrics?.[key] ?? 0;
  }
};

// Achievements-then-tags is the meaningful "overall rank"; every other
// column sorts on just itself (ties keep the prior relative order).
const compareEntries = (a, b, sort) => {
  const dir = sort.direction === 'asc' ? 1 : -1;
  if (sort.key === 'achievements') {
    const primary = (a.unlockedCount ?? 0) - (b.unlockedCount ?? 0);
    if (primary !== 0) return primary * dir;
    return ((a.metrics?.tags ?? 0) - (b.metrics?.tags ?? 0)) * dir;
  }
  const av = sortValue(a, sort.key);
  const bv = sortValue(b, sort.key);
  if (av < bv) return -1 * dir;
  if (av > bv) return 1 * dir;
  return 0;
};

let currentSort = { key: 'achievements', direction: 'desc' };
let currentScores = [];

function render() {
  const content = document.getElementById('content');
  const sorted = [...currentScores].sort((a, b) => compareEntries(a, b, currentSort));

  const headerCells = COLUMNS.map((col) => {
    if (!col.sortable && col.sortable !== undefined) {
      return `<th>${col.label}</th>`;
    }
    const isActive = currentSort.key === col.key;
    const arrow = isActive ? (currentSort.direction === 'asc' ? '▲' : '▼') : '';
    return `<th data-key="${col.key}"><span class="sort-arrow">${arrow}</span>${col.label}</th>`;
  }).join('');

  const rows = sorted
    .map((entry, index) => {
      const m = entry.metrics ?? {};
      const login = encodeURIComponent(entry.displayName ?? '');
      return `<tr>
        <td class="rank">${index + 1}</td>
        <td class="name" data-avatar-id="${escapeHtml(entry.id ?? '')}">
          <a href="https://github.com/${login}" target="_blank" rel="noopener noreferrer">${escapeHtml(entry.displayName ?? 'Unknown')}</a>
        </td>
        <td class="commission">${escapeHtml(entry.commission ?? 'Unranked')}</td>
        <td class="numeric">${(entry.unlockedCount ?? 0)} / ${(entry.totalAchievements ?? 0)}</td>
        <td class="numeric">${(m.texts ?? 0).toLocaleString()}</td>
        <td class="numeric">${(m.tags ?? 0).toLocaleString()}</td>
        <td class="numeric">${(m.disambiguated ?? 0).toLocaleString()}</td>
        <td class="numeric">${(m.entities ?? 0).toLocaleString()}</td>
      </tr>`;
    })
    .join('');

  content.innerHTML = `<table>
    <thead><tr>${headerCells}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;

  content.querySelectorAll('thead th[data-key]').forEach((th) => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      const col = COLUMNS.find((c) => c.key === key);
      if (currentSort.key === key) {
        currentSort = { key, direction: currentSort.direction === 'asc' ? 'desc' : 'asc' };
      } else {
        currentSort = { key, direction: col.defaultDir ?? 'asc' };
      }
      render();
    });
  });

  const preview = document.getElementById('avatar-preview');
  content.querySelectorAll('td.name[data-avatar-id]').forEach((cell) => {
    const id = cell.dataset.avatarId;
    if (!id) return;
    cell.addEventListener('mouseenter', (event) => {
      preview.src = `avatars/${id}.png`;
      preview.style.display = 'block';
      positionPreview(event);
    });
    cell.addEventListener('mousemove', positionPreview);
    cell.addEventListener('mouseleave', () => {
      preview.style.display = 'none';
      preview.removeAttribute('src');
    });
  });
}

function positionPreview(event) {
  const preview = document.getElementById('avatar-preview');
  preview.style.left = `${event.clientX + 16}px`;
  preview.style.top = `${event.clientY + 16}px`;
}

// No portrait submitted yet for this entry (older submission, or the
// desktop app didn't send one) - fail quietly rather than show a broken
// image icon.
document.getElementById('avatar-preview').addEventListener('error', function () {
  this.style.display = 'none';
});

async function main() {
  const content = document.getElementById('content');
  let scores;
  try {
    const response = await fetch('scores.json', { cache: 'no-store' });
    scores = await response.json();
  } catch (err) {
    content.innerHTML = '<div class="empty">Could not load scores.json.</div>';
    return;
  }

  if (!Array.isArray(scores) || scores.length === 0) {
    content.innerHTML = '<div class="empty">No scores submitted yet. Be the first to print a certificate and join the board.</div>';
    return;
  }

  currentScores = scores;
  render();

  const latest = scores.reduce((max, entry) => {
    const t = entry.updatedAt ? new Date(entry.updatedAt).getTime() : 0;
    return t > max ? t : max;
  }, 0);
  if (latest > 0) {
    document.getElementById('updated').textContent =
      'Last updated ' + new Date(latest).toLocaleString();
  }
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (char) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[char]));
}

main();
</script>
</body>
</html>
